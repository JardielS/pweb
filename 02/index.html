<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 02 - Tags HTML</title>
</head>
<body>

    <h1>Atividade 02 - Tags HTML</h1>
    <hr>

    <p>Esta palavra está em <b>negrito</b>.</p>
    <hr>
    <p>Linha 1<br>Linha 2 após quebra</p>

    <p>Este é um parágrafo de exemplo usando a tag p.</p>
    <hr>

    <h2>Lista não ordenada</h2>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <hr>

    <h2>Lista ordenada</h2>
    <ol>
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
    </ol>
    <hr>
    <h2>Imagem</h2>
    <img src="https://suap.ifpi.edu.br/media/configuracao/logo-ifpi-transp.png" width="200">

</body>
</html>
